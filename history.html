<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnzymEd — Past Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">
  <div class="top-bar">
    <a href="index.html"><div class="back-btn">←</div></a>
    <div>
      <div class="top-title">Past results</div>
      <div class="top-sub" id="historySubtitle">Your quiz history</div>
    </div>
  </div>
  <div class="picker-body">
    <div class="name-capture" id="nameCapture" style="display:none;">
      <div class="name-capture-label">What should we call you?</div>
      <div class="name-capture-row">
        <input type="text" id="nameInput" class="name-input" placeholder="Your name" maxlength="30">
        <button class="btn-primary name-save-btn" id="nameSaveBtn">Save</button>
      </div>
    </div>
    <div id="historyList"></div>
    <button class="btn-ghost" id="clearHistoryBtn" style="display:none; margin-top:8px;">Clear history</button>
  </div>
</div>

<script src="data/data-mathematics.js"></script>
<script src="data/data-chemistry.js"></script>
<script src="data/data-physics.js"></script>
<script src="data/data-biology.js"></script>
<script src="data/data-anatomy.js"></script>
<script src="data/data-physiology.js"></script>
<script src="data/data-biochemistry.js"></script>
<script src="data/data-microbiology.js"></script>
<script src="data/data-biostatistics.js"></script>
<script src="script.js"></script>
</body>
</html>
