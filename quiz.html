<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnzymEd — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">
  <div class="quiz-top">
    <div class="quiz-meta-row">
      <div class="quiz-course-tag" id="quizCourseTag">Loading…</div>
      <div class="quiz-timer mono" id="timerDisplay">⏱ 00:00</div>
    </div>
    <div class="quiz-progress-track"><div class="quiz-progress-fill" id="progressFill"></div></div>
    <div class="quiz-progress-label" id="progressLabel">QUESTION 1</div>
  </div>

  <div class="quiz-body">
    <div class="topic-overview" id="topicOverview" style="display:none;"></div>
    <div class="q-format-tag" id="formatTag">SINGLE BEST ANSWER</div>
    <div class="q-stem" id="questionStem"></div>
    <div class="q-options" id="optionsList"></div>
    <div class="explain-box" id="explainBox"><b>Why:</b> <span id="explainText"></span></div>
    <div class="quiz-footer">
      <button class="btn-primary" id="nextBtn" disabled onclick="nextQuestion()">Select an answer</button>
    </div>
  </div>
</div>

<script src="data-mathematics.js"></script>
<script src="data-chemistry.js"></script>
<script src="data-physics.js"></script>
<script src="data-biology.js"></script>
<script src="data-anatomy.js"></script>
<script src="data-physiology.js"></script>
<script src="data-biochemistry.js"></script>
<script src="data-microbiology.js"></script>
<script src="data-biostatistics.js"></script>
<script src="script.js"></script>
</body>
</html>
