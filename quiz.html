<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnzymEd — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">

  <!-- ===== OVERVIEW SCREEN (shown first, entirely separate from Q1) ===== -->
  <div id="overviewScreen">
    <div class="top-bar">
      <a href="javascript:history.back()"><div class="back-btn">←</div></a>
      <div>
        <div class="top-title" id="ovTitle">Loading…</div>
        <div class="top-sub">Overview</div>
      </div>
    </div>
    <div class="picker-body">
      <div class="topic-overview" id="ovText" style="margin-top:0;"></div>

      <div class="mode-choice-label">Choose how to practice</div>
      <div class="mode-card" id="modeQuizBtn">
        <div class="mode-card-icon">📝</div>
        <div>
          <div class="mode-card-title">Quiz Mode</div>
          <div class="mode-card-desc">See correct/incorrect and explanations instantly, question by question.</div>
        </div>
      </div>
      <div class="mode-card" id="modeExamBtn">
        <div class="mode-card-icon">⏳</div>
        <div>
          <div class="mode-card-title">Exam Mode</div>
          <div class="mode-card-desc" id="examModeDesc">Answers hidden until you submit. Timed, with auto-submit at zero.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== QUESTION SCREEN (Q1 onward — hidden until a mode is picked) ===== -->
  <div id="questionScreen" style="display:none;">
    <div class="quiz-top">
      <div class="quiz-meta-row">
        <div class="quiz-course-tag" id="quizCourseTag">Loading…</div>
        <div class="quiz-timer mono" id="timerDisplay">⏱ 00:00</div>
      </div>
      <div class="quiz-progress-track"><div class="quiz-progress-fill" id="progressFill"></div></div>
      <div class="quiz-progress-label" id="progressLabel">QUESTION 1</div>
      <!-- Question navigator — exam mode only, lets you jump to any question -->
      <div class="question-nav" id="questionNav" style="display:none;"></div>
    </div>

    <div class="quiz-body">
      <div class="q-format-tag" id="formatTag">SINGLE BEST ANSWER</div>
      <div class="q-stem" id="questionStem"></div>
      <div class="q-options" id="optionsList"></div>
      <div class="explain-box" id="explainBox"><b>Why:</b> <span id="explainText"></span></div>

      <!-- Quiz mode footer: single button, must answer to advance -->
      <div class="quiz-footer" id="quizModeFooter">
        <button class="btn-primary" id="nextBtn" disabled onclick="nextQuestion()">Select an answer</button>
      </div>

      <!-- Exam mode footer: Prev/Next (skip allowed) + always-available Submit -->
      <div class="quiz-footer exam-footer" id="examModeFooter" style="display:none;">
        <div class="exam-nav-row">
          <button class="btn-ghost" id="examPrevBtn" onclick="examPrevQuestion()">← Previous</button>
          <button class="btn-ghost" id="examNextBtn" onclick="examNextQuestion()">Skip / Next →</button>
        </div>
        <button class="btn-primary" id="submitExamBtn" onclick="confirmSubmitExam()">Submit exam</button>
      </div>
    </div>
  </div>

</div>

<script src="data/data-mathematics.js"></script>
<script src="data/data-chemistry.js"></script>
<script src="data/data-physics.js"></script>
<script src="data/data-biology.js"></script>
<script src="data/data-anatomy.js"></script>
<script src="data/data-physiology.js"></script>
<script src="data/data-biochemistry.js"></script>
<script src="data/data-microbiology.js"></script>
<script src="data/data-biostatistics.js"></script>
<script src="script.js"></script>
</body>
</html>
