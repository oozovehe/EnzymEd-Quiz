<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnzymEd — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">
  <div class="results-hero">
    <div class="score-ring" id="scoreRing"><div class="score-ring-in"><div class="score-num" id="scoreNum">0</div><div class="score-den" id="scoreDen">/ 0</div></div></div>
    <div class="results-title" id="resultsTitle">Nice run 🧪</div>
    <div class="results-sub" id="resultsSub">Here's how you did.</div>
  </div>
  <div class="results-breakdown">
    <div class="bd-row"><div class="bd-label">Correct</div><div class="bd-val good" id="bdCorrect">0</div></div>
    <div class="bd-row"><div class="bd-label">Incorrect</div><div class="bd-val bad" id="bdIncorrect">0</div></div>
    <div class="bd-row"><div class="bd-label">Time spent</div><div class="bd-val" id="bdTime">00:00</div></div>
  </div>
  <div class="results-footer">
    <button class="btn-primary" id="retryBtn">Retry this topic</button>
    <button class="btn-ghost" id="homeBtn">Back to home</button>
  </div>
</div>

<script src="data/data-mathematics.js"></script>
<script src="data/data-chemistry.js"></script>
<script src="data/data-physics.js"></script>
<script src="data/data-biology.js"></script>
<script src="data/data-anatomy.js"></script>
<script src="data/data-physiology.js"></script>
<script src="data/data-biochemistry.js"></script>
<script src="data/data-microbiology.js"></script>
<script src="data/data-biostatistics.js"></script>
<script src="script.js"></script>
</body>
</html>
